<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#D7268F" />
    <meta
      name="description"
      content="App local para ordenar ventas, productos, movimientos y reportes de Mora Vinería."
    />
    <link rel="icon" type="image/svg+xml" href="/mora-vineria/icon-192.svg" />
    <link rel="manifest" href="/mora-vineria/manifest.webmanifest" />
    <title>Mora Vinería</title>

    <script>
      (function () {
        var redirect = sessionStorage.getItem("mora-vineria-redirect");
        if (!redirect) return;

        sessionStorage.removeItem("mora-vineria-redirect");
        var base = "/mora-vineria/";
        var cleanRedirect = redirect.replace(/^\/+/, "");
        var nextPath = base + cleanRedirect;

        window.history.replaceState(null, "", nextPath);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
