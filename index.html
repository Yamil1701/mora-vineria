<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#D7268F" />
    <meta
      name="description"
      content="App local para ordenar ventas, productos, movimientos y reportes de Mora Vinería."
    />
    <link rel="icon" type="image/svg+xml" href="/mora-vineria/favicon.svg" />
    <link rel="apple-touch-icon" href="/mora-vineria/icons/apple-touch-icon.png" />
    <title>Mora Vinería</title>

    <script>
      (function () {
        var redirect = sessionStorage.getItem("mora-vineria-redirect");
        if (!redirect) return;

        sessionStorage.removeItem("mora-vineria-redirect");
        var base = "/mora-vineria/";
        var cleanRedirect = redirect.replace(/^\/+/, "");
        var nextPath = base + cleanRedirect;

        window.history.replaceState(null, "", nextPath);
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="mora-static-splash" aria-hidden="true">
        <img src="/mora-vineria/brand/logo-app.svg" alt="" />
      </div>
    </div>
    <style>
      html,body,#root{margin:0;min-height:100%;background:#121014}.mora-static-splash{min-height:100vh;display:grid;place-items:center}.mora-static-splash img{width:128px;height:128px;border-radius:28px}
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
