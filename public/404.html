<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#D7268F" />
    <title>Mora Vinería</title>
    <script>
      (function () {
        var base = "/mora-vineria/";
        var fullPath = window.location.pathname + window.location.search + window.location.hash;
        var redirect = fullPath.indexOf(base) === 0 ? fullPath.slice(base.length) : "";

        sessionStorage.setItem("mora-vineria-redirect", redirect);
        window.location.replace(base);
      })();
    </script>
  </head>
  <body style="margin:0;background:#121014;color:white;font-family:system-ui,sans-serif;">
    <main style="min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center;">
      <div>
        <p style="color:#F2C6D8;">Mora Vinería</p>
        <h1 style="margin:8px 0 0;">Abriendo la app</h1>
        <p style="color:rgba(255,255,255,.65);">Redirigiendo a la pantalla correcta.</p>
      </div>
    </main>
  </body>
</html>
